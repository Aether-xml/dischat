<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatCord - Giriş</title>
  <link rel="stylesheet" href="/css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="bg-animation">
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      <div class="shape shape-4"></div>
      <div class="shape shape-5"></div>
    </div>
  </div>

  <div class="auth-container">
    <!-- Login Form -->
    <div class="auth-card" id="loginCard">
      <div class="auth-header">
        <div class="logo-container">
          <i class="fas fa-comments logo-icon"></i>
          <h1>ChatCord</h1>
        </div>
        <p class="auth-subtitle">Tekrar hoş geldin!</p>
        <h2>Giriş yapmak güzel!</h2>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>E-POSTA</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" required placeholder="ornek@email.com">
          </div>
        </div>

        <div class="form-group">
          <label>ŞİFRE</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" required placeholder="Şifreniz">
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="error-message" id="loginError"></div>

        <button type="submit" class="auth-btn">
          <span>Giriş Yap</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        <span>Hesabın yok mu?</span>
        <a href="#" onclick="showRegister()">Kayıt Ol</a>
      </div>
    </div>

    <!-- Register Form -->
    <div class="auth-card hidden" id="registerCard">
      <div class="auth-header">
        <div class="logo-container">
          <i class="fas fa-comments logo-icon"></i>
          <h1>ChatCord</h1>
        </div>
        <p class="auth-subtitle">Bir hesap oluştur</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>KULLANICI ADI</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="regUsername" required placeholder="KullaniciAdi" minlength="3" maxlength="20">
          </div>
        </div>

        <div class="form-group">
          <label>E-POSTA</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" required placeholder="ornek@email.com">
          </div>
        </div>

        <div class="form-group">
          <label>ŞİFRE</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPassword" required placeholder="Minimum 6 karakter" minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>AVATAR SEÇ</label>
          <div class="avatar-selection" id="avatarSelection">
            <div class="avatar-option selected" data-avatar="default-avatar.png">
              <div class="avatar-circle" style="background: linear-gradient(135deg, #5865F2, #7289DA);">
                <i class="fas fa-user"></i>
              </div>
            </div>
            <div class="avatar-option" data-avatar="avatar1.png">
              <div class="avatar-circle avatar-1">1</div>
            </div>
            <div class="avatar-option" data-avatar="avatar2.png">
              <div class="avatar-circle avatar-2">2</div>
            </div>
            <div class="avatar-option" data-avatar="avatar3.png">
              <div class="avatar-circle avatar-3">3</div>
            </div>
            <div class="avatar-option" data-avatar="avatar4.png">
              <div class="avatar-circle avatar-4">4</div>
            </div>
            <div class="avatar-option" data-avatar="avatar5.png">
              <div class="avatar-circle avatar-5">5</div>
            </div>
            <div class="avatar-option" data-avatar="avatar6.png">
              <div class="avatar-circle avatar-6">6</div>
            </div>
          </div>
        </div>

        <div class="error-message" id="registerError"></div>

        <button type="submit" class="auth-btn">
          <span>Kayıt Ol</span>
          <i class="fas fa-rocket"></i>
        </button>
      </form>

      <div class="auth-footer">
        <span>Zaten hesabın var mı?</span>
        <a href="#" onclick="showLogin()">Giriş Yap</a>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
